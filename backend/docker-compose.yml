# Yerel PostgreSQL + API (Faz 1 E2E / test.py)
#
# Çalıştırma:
#   cd backend
#   ./scripts/docker-test.sh
#
# Yalnızca veritabanı:
#   docker compose up -d db
#   DATABASE_URL=postgresql://aidatpanel:aidatpanel@127.0.0.1:5433/aidatpanel?schema=public npm start

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aidatpanel
      POSTGRES_PASSWORD: aidatpanel
      POSTGRES_DB: aidatpanel
    ports:
      - "5433:5432"
    volumes:
      - aidatpanel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidatpanel -d aidatpanel"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: development
      PORT: "4200"
      DATABASE_URL: postgresql://aidatpanel:aidatpanel@db:5432/aidatpanel?schema=public
      JWT_SECRET: docker_dev_jwt_secret_min_32_chars_long_xx
      REFRESH_TOKEN_SECRET: docker_dev_refresh_secret_min_32_chars
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 30d
      AUTH_RATE_LIMIT_MAX: "500"
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:4200,http://127.0.0.1:3000
      # Host test.py bu dosyayı okur (./e2e-data ↔ /data/e2e)
      AIDATPANEL_E2E_RESET_LOG: /data/e2e/reset.jsonl
    volumes:
      - ./e2e-data:/data/e2e

volumes:
  aidatpanel_pg_data:
