# Yerel geliştirme: sadece PostgreSQL (host’taki 5432 ile çakışmaması için 5433)
# Kullanım: docker compose up -d
# DATABASE_URL=postgresql://aidatpanel:aidatpanel@127.0.0.1:5433/aidatpanel?schema=public

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aidatpanel
      POSTGRES_PASSWORD: aidatpanel
      POSTGRES_DB: aidatpanel
    ports:
      - "5433:5432"
    volumes:
      - aidatpanel_pg_data:/var/lib/postgresql/data

volumes:
  aidatpanel_pg_data:
